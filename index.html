<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>وضعیت سرویس‌ها | Status Page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <!-- هدر -->
        <header>
            <div class="header-left">
                <h1>📊 مانیتورینگ سرویس‌ها</h1>
                <p id="lastUpdate">آخرین بروزرسانی: در حال بارگذاری...</p>
            </div>
            <button id="refreshBtn" onclick="refreshAll()">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">بروزرسانی</span>
            </button>
        </header>

        <!-- وضعیت کلی -->
        <div id="overallStatus" class="overall-status">
            <div class="status-icon">✅</div>
            <span class="status-badge">همه سرویس‌ها آنلاین</span>
        </div>

        <!-- لیست سایت‌ها -->
        <div id="sitesList" class="sites-grid">
            <!-- توسط جاوااسکریپت پر می‌شه -->
        </div>

        <!-- فوتر -->
        <footer>
            <p>ساخته شده با ❤️ | داده‌ها از فایل JSON</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
